name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-amd64
            binary: tropa-relay
          - os: windows-latest
            asset_name: windows-amd64
            binary: tropa-relay.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: zip tropa-relay-${{ github.ref_name }}-${{ matrix.asset_name }}.zip -j target/release/${{ matrix.binary }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/release/${{ env.BINARY }} -DestinationPath tropa-relay-${{ env.TAG }}-${{ env.ASSET }}.zip
        env:
          TAG: ${{ github.ref_name }}
          BINARY: ${{ matrix.binary }}
          ASSET: ${{ matrix.asset_name }}

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y
          Copy-Item "target/release/tropa-relay.exe" "installer/"
          Copy-Item "assets/icon.ico" "installer/"
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DTAG=${{ github.ref_name }} "installer/tropa-relay.nsi"
          Move-Item "installer/tropa-relay-*-setup.exe" .
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: tropa-relay-${{ matrix.asset_name }}
          path: |
            tropa-relay-*.zip
            tropa-relay-*-setup.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            tropa-relay-*.zip
            tropa-relay-*-setup.exe
          generate_release_notes: true
