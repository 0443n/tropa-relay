name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: zip tropa-relay-${{ github.ref_name }}-${{ matrix.target }}.zip -j target/release/tropa-relay

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path target/release/tropa-relay.exe -DestinationPath tropa-relay-${{ env.TAG }}-${{ matrix.target }}.zip
        env:
          TAG: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: tropa-relay-${{ matrix.target }}
          path: tropa-relay-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: tropa-relay-*.zip
          generate_release_notes: true
